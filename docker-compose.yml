version: '3.8'

services:
  wordpress:
    image: wordpress:latest
    container_name: kawachi-wordpress
    restart: always
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: do0xKFSLuCpi56N1bqCmDCC2N01UvIhk
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_CONFIG_EXTRA: "define('WP_HOME','https://kawachigroup.com'); define('WP_SITEURL','https://kawachigroup.com');"
    volumes:
      - wordpress-3ht1_wordpress:/var/www/html
    networks:
      - wordpress-3ht1_default
      - db-network
    labels:
      - "traefik.enable=true"
      # Traefik routing rule updated to match your new domain
      - "traefik.http.routers.wordpress-http.rule=Host(`kawachigroup.com`)"
      - "traefik.http.routers.wordpress-http.entrypoints=web"
      - "traefik.http.routers.wordpress-http.middlewares=redirect-to-https"
      
      # HTTPS Configuration
      - "traefik.http.routers.wordpress-https.rule=Host(`kawachigroup.com`)"
      - "traefik.http.routers.wordpress-https.entrypoints=websecure"
      - "traefik.http.routers.wordpress-https.tls=true"
      - "traefik.http.routers.wordpress-https.tls.certresolver=letsencrypt"
      
      # Loadbalancer port assignment
      - "traefik.http.services.wordpress.loadbalancer.server.port=80"

  db:
    image: mysql:8.0.46
    container_name: kawachi-wordpress-db
    restart: always
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: do0xKFSLuCpi56N1bqCmDCC2N01UvIhk
      MYSQL_ROOT_PASSWORD: GdgsSkzg9HiesN0mk5wBqR5znd5Qu2vd
    volumes:
      - wordpress-3ht1_db:/var/lib/mysql
    networks:
      - db-network

volumes:
  wordpress-3ht1_wordpress:
    external: true
  wordpress-3ht1_db:
    external: true

networks:
  wordpress-3ht1_default:
    external: true
  db-network:
    internal: true
