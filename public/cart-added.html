<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Added to Cart - Kawachi</title>
    <meta
      name="description"
      content="Item successfully added to your Kawachi cart. Review your order and proceed to checkout."
    />
    <link rel="stylesheet" href="css/global-styles.css?v=7.70" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <style>
      body,
      #main-content {
        background-color: #f8fafc;
      }

      /* ── Confirmation Card ── */
      .cart-added-card {
        margin: 0 0 40px;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 0;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        overflow: hidden;
      }

      /* Subtle green confirmation bar */
      .confirm-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 28px;
        background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%);
        border-bottom: 1px solid #d1fae5;
      }

      .confirm-bar svg {
        flex-shrink: 0;
        color: #16a34a;
      }

      .confirm-bar span {
        font-size: 15px;
        font-weight: 600;
        color: #15803d;
        letter-spacing: -0.01em;
      }

      /* Product details area */
      .confirm-body {
        padding: 24px 28px;
      }

      .confirm-product {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 20px;
      }

      .confirm-product-img {
        width: 96px;
        height: 96px;
        object-fit: contain;
        background: #f8fafc;
        border: 1px solid #f1f5f9;
        border-radius: 12px;
        padding: 8px;
        flex-shrink: 0;
      }

      .confirm-product-name {
        font-size: 15px;
        font-weight: 600;
        color: #0f172a;
        line-height: 1.45;
        margin: 0 0 6px;
      }

      .confirm-product-meta {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .confirm-product-price {
        font-size: 18px;
        font-weight: 800;
        color: #0f172a;
        margin: 0;
      }

      .confirm-product-qty {
        font-size: 12.5px;
        color: #64748b;
        background: #f1f5f9;
        padding: 3px 10px;
        border-radius: 20px;
        font-weight: 500;
      }

      /* Subtotal row */
      .confirm-subtotal-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 0;
        border-top: 1px solid #f1f5f9;
        margin-bottom: 20px;
      }

      .confirm-subtotal-label {
        font-size: 14px;
        color: #475569;
        font-weight: 500;
      }

      .confirm-subtotal-value {
        font-size: 20px;
        font-weight: 800;
        color: #e05e3f;
      }

      /* Action Buttons */
      .confirm-actions {
        display: flex;
        gap: 12px;
      }

      .ca-btn {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 13px 20px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        border: none;
        text-decoration: none;
        transition: all 0.2s ease;
        text-align: center;
      }

      .ca-btn.primary {
        background: linear-gradient(135deg, #e05e3f 0%, #d4503a 100%);
        color: #fff;
        box-shadow: 0 2px 8px rgba(224, 94, 63, 0.25);
      }

      .ca-btn.primary:hover {
        background: linear-gradient(135deg, #c94b2d 0%, #b8422a 100%);
        box-shadow: 0 4px 16px rgba(224, 94, 63, 0.35);
        transform: translateY(-1px);
      }

      .ca-btn.secondary {
        background: #f8fafc;
        color: #1e293b;
        border: 1.5px solid #e2e8f0;
      }

      .ca-btn.secondary:hover {
        background: #f1f5f9;
        border-color: #cbd5e1;
        transform: translateY(-1px);
      }

      .ca-btn svg {
        flex-shrink: 0;
      }

      /* ── Related Products ── */
      .rel-section-title {
        font-size: 18px;
        font-weight: 700;
        color: #0f172a;
        margin-bottom: 18px;
        display: none;
      }

      .rel-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
        gap: 14px;
      }

      .rel-card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        overflow: hidden;
        text-decoration: none;
        color: inherit;
        display: block;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      .rel-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.09);
      }

      .rel-img-wrap {
        aspect-ratio: 1;
        background: #f8fafc;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px;
        position: relative;
      }

      .rel-img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }

      .rel-disc {
        position: absolute;
        top: 8px;
        left: 8px;
        background: #cc0c39;
        color: #fff;
        font-size: 10px;
        font-weight: 700;
        padding: 2px 6px;
        border-radius: 3px;
      }

      .rel-info {
        padding: 10px 12px;
      }

      .rel-name {
        font-size: 12px;
        font-weight: 600;
        color: #0f172a;
        line-height: 1.35;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        margin-bottom: 5px;
      }

      .rel-price {
        font-size: 14px;
        font-weight: 700;
        color: #0f1111;
      }

      .rel-atc {
        display: block;
        width: 100%;
        text-align: center;
        background: #e05e3f;
        color: #fff;
        border: none;
        padding: 8px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }

      .rel-atc:hover {
        background: #c94b2d;
      }

      /* ── Responsive ── */
      @media (max-width: 768px) {
        .cart-added-card {
          margin-left: 8px;
          margin-right: 8px;
          border-radius: 12px;
        }
        .confirm-bar {
          padding: 12px 16px;
        }
        .confirm-body {
          padding: 18px 16px;
        }
        .confirm-product {
          gap: 14px;
        }
        .confirm-product-img {
          width: 76px;
          height: 76px;
        }
        .confirm-product-name {
          font-size: 13.5px;
        }
        .confirm-product-meta {
          flex-direction: column;
          align-items: flex-start;
          gap: 4px;
        }
        .confirm-actions {
          flex-direction: column;
        }
        .ca-btn {
          padding: 14px;
          font-size: 14.5px;
        }
        .rel-grid {
          grid-template-columns: repeat(2, 1fr) !important;
          gap: 10px;
        }
      }
      @media (min-width: 1024px) {
        .rel-grid {
          grid-template-columns: repeat(6, 1fr) !important;
          gap: 16px !important;
        }
      }
    </style>
  </head>
  <body>
    <header class="main-header marketplace-header" id="site-header">
      <div class="container header-container">
        <div class="logo-group">
          <a
            href="index.html"
            class="logo brand-logo white-logo"
            id="site-logo"
          >
            <span>K</span
            ><span class="logo-body"
              >awac<span class="logo-tagline">life banaye easy</span></span
            ><span>hi<sup>&reg;</sup></span>
          </a>
        </div>
        <div class="category-select-container">
          <select
            class="all-categories-select"
            aria-label="All Categories"
            onchange="
              if (this.value && this.value !== '#')
                window.location.href = this.value;
            "
          >
            <option value="#">All Categories</option>
            <option value="search.html?q=Furniture">Home Furniture</option>
            <option value="search.html?q=Kitchen">Kitchen Storage</option>
            <option value="search.html?q=Beauty">Health &amp; Beauty</option>

          </select>
        </div>
        <div class="search-container">
          <form
            action="search.html"
            method="GET"
            id="header-search-form"
            style="display: flex; align-items: center; width: 100%"
          >
            <div class="search-bar-inner">
              <input
                type="text"
                class="search-input"
                name="q"
                placeholder="Search products..."
                aria-label="Search Products"
                autocomplete="off"
              />
              <button
                type="submit"
                class="search-submit-btn"
                aria-label="Submit Search"
              >
                <svg
                  width="18"
                  height="18"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                  />
                </svg>
              </button>
            </div>
          </form>
        </div>
        <div class="header-utilities">
          <a href="wishlist.html" class="utility-link">
            <svg
              width="20"
              height="20"
              fill="none"
              stroke="currentColor"

              viewBox="0 0 24 24"

              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"
              ></path>
            </svg>
            <span>Wishlist</span>
          </a>
          <a href="account.html" class="utility-link">
            <svg

              height="20"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
              ></path>
            </svg>
            <span>Account</span>
          </a>
          <a href="orders.html" class="utility-link">
            <svg
              width="20"
              height="20"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"

              ></path>
            </svg>
            <span>Orders</span>
          </a>
          <button
            id="cart-drawer-trigger"
            class="utility-link"
            aria-label="Open Shopping Cart"
            aria-expanded="false"
          >
            <div
              style="
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
              "
            >
              <svg
                width="20"
                height="20"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"
                />
              </svg>
              <span class="badge" id="cart-badge-count">0</span>
            </div>
            <span>Cart</span>
          </button>
        </div>
      </div>
      <div class="sub-navbar-redesign">
        <div class="container sub-nav-container">
          <div class="sub-nav-left">
            <a href="index.html" class="sub-nav-link">Home</a>
            <a href="search.html?q=Furniture" class="sub-nav-link"

            <a href="search.html?q=Kitchen" class="sub-nav-link"

            <a href="search.html?q=new" class="sub-nav-link">New Arrivals</a>

    <main id="main-content" style="padding: 32px 0 60px">
      <div
        class="container"
        style="max-width: 1200px; margin: 0 auto; padding: 0 20px"
      >
        <!-- Confirmation Card -->
        <div class="cart-added-card">
          <!-- Subtle green confirmation header -->
          <div class="confirm-bar">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
              />
            </svg>
            <span>Added to Cart</span>
          </div>

          <div class="confirm-body">
            <!-- Product Row -->
            <div
              class="confirm-product"
              style="display: flex; align-items: center; gap: 16px"
            >
              <div
                id="added-img-shimmer"
                class="skeleton-shimmer"
                style="
                  width: 80px;
                  height: 80px;
                  border-radius: 8px;
                  flex-shrink: 0;
                "
              ></div>
              <img
                id="added-img"
                src=""
                alt="Product"
                class="confirm-product-img"
                style="
                  display: none;
                  width: 80px;
                  height: 80px;
                  object-fit: contain;
                "
              />
              <div style="flex-grow: 1">
                <div
                  id="added-name-shimmer"
                  class="skeleton-shimmer"
                  style="
                    width: 200px;
                    height: 18px;
                    border-radius: 4px;
                    margin-bottom: 8px;
                  "
                ></div>
                <p
                  id="added-name"
                  class="confirm-product-name"
                  style="display: none; font-weight: 700; margin: 0"
                ></p>
                <div class="confirm-product-meta" style="margin-top: 4px">
                  <div
                    id="added-price-shimmer"
                    class="skeleton-shimmer"
                    style="width: 85px; height: 16px; border-radius: 4px"
                  ></div>
                  <p
                    id="added-price"
                    class="confirm-product-price"
                    style="
                      display: none;
                      font-weight: 700;
                      color: var(--color-text-main);
                      margin: 0;
                    "
                  >
                    &#8377;0
                  </p>
                  <span
                    id="added-qty"
                    class="confirm-product-qty"
                    style="
                      display: none;
                      font-size: var(--text-xs);
                      color: var(--color-text-muted);
                    "
                    >Qty: 1</span
                  >
                </div>
              </div>
            </div>

            <!-- Subtotal -->
            <div class="confirm-subtotal-row">
              <span class="confirm-subtotal-label"
                >Cart subtotal (<span id="sub-count">1</span> item<span
                  id="sub-plural"
                ></span
                >)</span
              >
              <span class="confirm-subtotal-value" id="sub-amount"
                >&#8377;0</span
              >
            </div>

            <!-- Action Buttons -->
            <div class="confirm-actions">
              <a href="checkout.html" class="ca-btn primary" id="checkout-btn">
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                >

                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M17 8l4 4m0 0l-4 4m4-4H3"
                  />
                </svg>
                Proceed to Buy
              </a>
              <a href="cart.html" class="ca-btn secondary">
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"

                  />

                Go to Cart

    <section class="partner-brands-section">
      <div class="container">
        <p class="partner-cloud-title">Our Partner Brands</p>
        <div class="logo-scroll-track"></div>
      </div>
    </section>

    <footer class="main-footer">
      <div class="footer-bottom-bar">
        <div class="container footer-bottom-flex">
          <span>&copy; 1992 Kawachi Group. All rights reserved.</span>
        </div>
      </div>
    </footer>

    <script src="js/main-api.js?v=8.00"></script>
    <script>
      document.addEventListener("DOMContentLoaded", async function () {
        // Await WooCommerce live products loading before showing recommended panel
        if (window.KawachiProductsPromise) {
          try {
            await window.KawachiProductsPromise;
          } catch (err) {
            console.warn(
              "[WooCommerce Client] cart-added.html load await failed:",
              err,
            );
          }
        }

        var params = new URLSearchParams(window.location.search);
        var productId = parseInt(params.get("id"), 10);
        var qty = parseInt(params.get("qty"), 10) || 1;
        if (!productId || !window.KawachiProducts) return;

        var p = window.KawachiProducts.find(function (x) {
          return x.id === productId;
        });
        if (!p) {
          if (typeof window.resolveProductIds === "function") {
            try {
              const resolvedMap = await window.resolveProductIds([productId]);
              p = resolvedMap[productId];
            } catch (err) {
              console.warn(
                "[cart-added.html] Failed to resolve product ID dynamically:",
                err,
              );
            }
          }
        }
        if (!p) return;

        // Hydrate confirmation card
        // Hide shimmers
        document.getElementById("added-img-shimmer").style.display = "none";
        document.getElementById("added-name-shimmer").style.display = "none";
        document.getElementById("added-price-shimmer").style.display = "none";

        // Show and populate real contents
        var img = document.getElementById("added-img");
        img.src = p.image;
        img.alt = p.name;
        img.style.display = "block";

        var name = document.getElementById("added-name");
        name.textContent = p.name;
        name.style.display = "block";

        var price = document.getElementById("added-price");
        price.textContent = "\u20b9" + Number(p.price).toLocaleString("en-IN");
        price.style.display = "block";

        var qtyEl = document.getElementById("added-qty");
        qtyEl.textContent = "Qty: " + qty;
        qtyEl.style.display = "inline";

        // Update breadcrumb with product name
        var breadcrumbEl = document.getElementById("breadcrumb-product");
        if (breadcrumbEl) breadcrumbEl.textContent = p.name;

        var cartItems = window.KawachiCart ? window.KawachiCart.items : [];
        var cartCount =
          cartItems.reduce(function (sum, item) {
            return sum + item.quantity;
          }, 0) || qty;
        var subtotal =
          cartItems.reduce(function (sum, item) {
            return sum + item.price * item.quantity;
          }, 0) || p.price * qty;

        document.getElementById("sub-count").textContent = cartCount;
        document.getElementById("sub-plural").textContent =
          cartCount > 1 ? "s" : "";
        document.getElementById("sub-amount").textContent =
          "\u20b9" + Number(subtotal).toLocaleString("en-IN");
        document.getElementById("checkout-btn").innerHTML =
          '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg> Proceed to Buy (' +
          cartCount +
          " item" +
          (cartCount > 1 ? "s" : "") +
          ")";

        // Related products
        var heading = document.getElementById("rel-heading");
        var grid = document.getElementById("rel-grid");
        var related = window.KawachiProducts.filter(function (x) {
          return x.id !== productId;
        })
          .sort(function (a, b) {
            return b.id - a.id;
          })
          .slice(0, 12);

        if (related.length && grid) {
          grid.innerHTML = related
            .map(function (rp) {
              var disc =
                rp.regular_price && rp.regular_price > rp.price
                  ? Math.round(
                      ((rp.regular_price - rp.price) / rp.regular_price) * 100,
                    )
                  : 0;
              return (
                '<a href="single-product.html?id=' +
                rp.id +
                '" class="rel-card">' +
                '<div class="rel-img-wrap">' +
                (disc ? '<span class="rel-disc">-' + disc + "%</span>" : "") +
                '<img src="' +
                rp.image +
                '" alt="' +
                rp.name +
                '" class="rel-img" loading="lazy">' +
                "</div>" +
                '<div class="rel-info">' +
                '<p class="rel-name">' +
                rp.name +
                "</p>" +
                '<span class="rel-price">&#8377;' +
                Number(rp.price).toLocaleString("en-IN") +
                "</span>" +
                "</div>" +
                '<button class="rel-atc" onclick="event.preventDefault();event.stopPropagation();' +
                "if(window.KawachiCart){window.KawachiCart.addItem({id:" +
                rp.id +
                ",name:'" +
                rp.name.replace(/'/g, "\\'") +
                "',price:" +
                rp.price +
                ",image:'" +
                rp.image +
                "',category:'" +
                rp.category +
                "',quantity:1});}" +
                "window.location.href='cart-added.html?id=" +
                rp.id +
                "&qty=1';\">Add to Cart</button>" +
                "</a>"
              );
            })
            .join("");
          heading.style.display = "block";
        }
      });
    </script>
  </body>
</html>
